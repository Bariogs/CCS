<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Codes — CCS Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* Gipa-consistent ang gidak-on sa litrato sa modal para dili matago
     ang Share button bisan unsa pa kadaghan/kagamay ang orig nga photo. */
  .modal{
    max-height: 90vh;
    overflow-y: auto;
  }
  #modalPhoto.photo{
    display: block;
    width: 100%;
    max-width: 280px;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
    margin: 12px auto;
    background: #eee;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span> CCS Attendance</div>
  <nav>
    <span class="who" id="whoLabel"></span>
    <a href="#" id="dashLink">Dashboard</a>
    <a href="me.html">Shared Records</a>
    <button id="logoutBtn">Log out</button>
  </nav>
</div>

<div class="wrap">
  <div class="card">
    <p class="eyebrow">QR Codes</p>
    <h1 class="page-title">QR Codes for Attendance</h1>
    <p class="page-sub">Click on a QR code to view its details. Use the Share button to add it to the records list.</p>

    <div id="grid" class="grid"></div>
    <div id="emptyState" class="empty" style="display:none;">No QR codes available.</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="close" id="closeModal">✕</button>
    <div id="modalLoading" class="empty">Fetching details...</div>
    <div id="modalContent" style="display:none;">
      <p class="eyebrow" style="margin:0;">Attendance Detail</p>
      <img id="modalPhoto" class="photo" src="" alt="photo">
      <div class="row"><b id="modalName"></b></div>
      <div class="row">📍 <span id="modalAddress"></span></div>
      <div class="row">🕒 <span id="modalTime"></span></div>
      <button class="btn gold block" id="shareBtn" style="margin-top:12px;">Share</button>
      <div id="shareMsg" class="msg ok" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, getDocs, doc, getDoc, deleteDoc, addDoc, serverTimestamp, orderBy, query
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

// ---- Auth guard ----
const role = sessionStorage.getItem("role");
const displayName = sessionStorage.getItem("displayName");
if(!role){
  window.location.href = "login.html";
}
document.getElementById("whoLabel").textContent = displayName || "";
document.getElementById("dashLink").href = role === "admin" ? "admin_dashboard.html" : "student_dashboard.html";
document.getElementById("logoutBtn").addEventListener("click", () => {
  sessionStorage.clear();
  window.location.href = "login.html";
});

const grid = document.getElementById("grid");
const emptyState = document.getElementById("emptyState");

function formatTime(ts){
  if(!ts || !ts.toDate) return "—";
  return ts.toDate().toLocaleString();
}

function checkEmpty(){
  emptyState.style.display = grid.children.length === 0 ? "block" : "none";
}

async function loadQRs(){
  grid.innerHTML = "";
  const q = query(collection(db, "qr"), orderBy("timestamp", "desc"));
  const snap = await getDocs(q);

  if(snap.empty){
    emptyState.style.display = "block";
    return;
  }

  emptyState.style.display = "none";
  snap.forEach(docSnap => {
    const data = docSnap.data();
    const tile = document.createElement("div");
    tile.className = "qr-tile";
    tile.dataset.qrId = docSnap.id;
    tile.innerHTML = `
      <img src="${data.qrImage}" alt="QR code">
      <div class="name">${data.name}</div>
      <div class="time">${formatTime(data.timestamp)}</div>
    `;
    tile.addEventListener("click", () => openModal(data.attendanceId, docSnap.id, tile));
    grid.appendChild(tile);
  });
}

// ---- Modal ----
const modalBg = document.getElementById("modalBg");
const modalLoading = document.getElementById("modalLoading");
const modalContent = document.getElementById("modalContent");
const modalPhoto = document.getElementById("modalPhoto");
const modalName = document.getElementById("modalName");
const modalAddress = document.getElementById("modalAddress");
const modalTime = document.getElementById("modalTime");
const shareBtn = document.getElementById("shareBtn");
const shareMsg = document.getElementById("shareMsg");

let currentAttendance = null;
let currentQrId = null;
let currentTile = null;

async function openModal(attendanceId, qrId, tileEl){
  currentQrId = qrId;
  currentTile = tileEl;

  modalBg.classList.add("show");
  modalLoading.style.display = "block";
  modalContent.style.display = "none";
  shareBtn.style.display = "inline-block";
  shareBtn.disabled = false;
  shareBtn.textContent = "Share";
  shareMsg.className = "msg ok";
  shareMsg.textContent = "";

  const snap = await getDoc(doc(db, "attendance", attendanceId));
  if(snap.exists()){
    const data = snap.data();
    currentAttendance = { id: attendanceId, ...data };
    modalPhoto.src = data.photo;
    modalName.textContent = data.name;
    modalAddress.textContent = data.address;
    modalTime.textContent = formatTime(data.timestamp);
    modalLoading.style.display = "none";
    modalContent.style.display = "block";
  } else {
    modalLoading.textContent = "Record not found.";
  }
}

function closeModal(){
  modalBg.classList.remove("show");
  currentAttendance = null;
  currentQrId = null;
  currentTile = null;
}

document.getElementById("closeModal").addEventListener("click", closeModal);
modalBg.addEventListener("click", (e) => {
  if(e.target === modalBg) closeModal();
});

shareBtn.addEventListener("click", async () => {
  if(!currentAttendance || !currentQrId) return;
  shareBtn.disabled = true;
  shareBtn.innerHTML = '<span class="spinner"></span>';

  // 1. I-save sa Shared Records — kung mag-fail ni, i-stop gyud kay
  //    kinahanglan gyud successful ni una sa tanan.
  try{
    await addDoc(collection(db, "sharedRecords"), {
      attendanceId: currentAttendance.id,
      name: currentAttendance.name,
      address: currentAttendance.address,
      timestamp: serverTimestamp()
    });
  }catch(err){
    console.error("Failed to add to sharedRecords:", err);
    shareMsg.className = "msg error show";
    shareMsg.textContent = "There was an issue sharing the record.";
    shareBtn.disabled = false;
    shareBtn.textContent = "Share";
    return;
  }

  // 2. Human na-share, mawala dayon ang picture/tile sa screen —
  //    kini nga UI update independent na sa deleteDoc sa ubos,
  //    aron dili na "mo-stock" ang tile bisan pa ug ma-block sa
  //    Firestore Security Rules ang delete permission.
  shareMsg.textContent = "Shared! You can view it in the Shared Records.";
  shareMsg.classList.add("show");
  shareBtn.style.display = "none";

  const tileToRemove = currentTile;
  if(tileToRemove){
    tileToRemove.remove();
    checkEmpty();
  }
  setTimeout(() => {
    closeModal();
  }, 900);

  // 3. Sulayan tangtangon ang QR record sa Firestore para dili na
  //    mubalik pakita sa sunod nga reload. Kung mag-fail ni (e.g.
  //    walay delete permission sa Security Rules), i-log ra ang
  //    error — dili na kini makaapekto sa UI kay nawala na man daan
  //    ang tile sa itaas.
  try{
    await deleteDoc(doc(db, "qr", currentQrId));
  }catch(err){
    console.error("Failed to delete qr doc (check Firestore rules for delete on 'qr'):", err);
  }
});

loadQRs();
</script>
</body>
</html>
