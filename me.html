<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Records — CCS Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="me.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span> CCS Attendance</div>
  <nav>
    <span class="who" id="whoLabel"></span>
    <a href="#" id="dashLink">Dashboard</a>
    <a href="qr.html">QR Code</a>
    <button id="logoutBtn">Log out</button>
  </nav>
</div>

<div class="wrap">
  <div class="card">
    <p class="eyebrow">Shared Records</p>
    <h1 class="page-title">Shared Records</h1>
    <p class="page-sub">This list contains records shared from the QR Code page. Downloading clears this list — it will only show new records shared after that.</p>

    <button class="btn gold" id="downloadBtn" style="display:none;"><span id="downloadBtnText">⬇ Download as Excel</span></button>
    <div id="downloadMsg" class="msg"></div>

    <div class="table-scroll" id="recordsTableWrap" style="display:none;">
      <table class="records" id="recordsTable">
        <thead>
          <tr><th>#</th><th>Name</th><th>Address</th><th>Date &amp; Time</th></tr>
        </thead>
        <tbody id="recordsBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty" style="display:none;">No shared records available.</div>
  </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, getDocs, query, orderBy, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

// ---- Auth guard ----
const role = sessionStorage.getItem("role");
const displayName = sessionStorage.getItem("displayName");
if(!role){
  window.location.href = "login.html";
}
document.getElementById("whoLabel").textContent = displayName || "";
document.getElementById("dashLink").href = role === "admin" ? "admin_dashboard.html" : "student_dashboard.html";
document.getElementById("logoutBtn").addEventListener("click", () => {
  sessionStorage.clear();
  window.location.href = "login.html";
});

// Only admin can download the Excel file
if(role === "admin"){
  document.getElementById("downloadBtn").style.display = "inline-flex";
}

const downloadBtn = document.getElementById("downloadBtn");
const downloadBtnText = document.getElementById("downloadBtnText");
const downloadMsg = document.getElementById("downloadMsg");
const recordsBody = document.getElementById("recordsBody");
const recordsTableWrap = document.getElementById("recordsTableWrap");
const emptyState = document.getElementById("emptyState");

// rows: the data used to build the Excel file
// docIds: the Firestore doc IDs behind those same rows, so we know
// exactly what to delete once the download has gone through
let rows = [];
let docIds = [];

function formatTime(ts){
  if(!ts || !ts.toDate) return "—";
  return ts.toDate().toLocaleString();
}

function showEmpty(){
  recordsBody.innerHTML = "";
  recordsTableWrap.style.display = "none";
  emptyState.style.display = "block";
  rows = [];
  docIds = [];
}

async function loadRecords(){
  const q = query(collection(db, "sharedRecords"), orderBy("timestamp", "desc"));
  const snap = await getDocs(q);

  if(snap.empty){
    showEmpty();
    return;
  }

  emptyState.style.display = "none";
  recordsTableWrap.style.display = "block";
  recordsBody.innerHTML = "";
  rows = [];
  docIds = [];

  let i = 1;
  snap.forEach(docSnap => {
    const data = docSnap.data();
    docIds.push(docSnap.id);
    rows.push({
      "#": i,
      "Name": data.name,
      "Address": data.address || "",
      "Date & Time": formatTime(data.timestamp)
    });
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${i}</td><td>${data.name}</td><td>${data.address || ""}</td><td>${formatTime(data.timestamp)}</td>`;
    recordsBody.appendChild(tr);
    i++;
  });
}

downloadBtn.addEventListener("click", async () => {
  if(rows.length === 0){
    alert("No data to download.");
    return;
  }

  downloadBtn.disabled = true;
  downloadBtnText.innerHTML = '<span class="spinner"></span>';
  downloadMsg.className = "msg";
  downloadMsg.textContent = "";

  try{
    // 1. Generate and save the Excel file first — the list should
    //    only be cleared once the download has actually gone through.
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Attendance");
    const fileName = `CCS-Attendance-${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, fileName);

    // 2. Delete every shared record that was included in this download,
    //    so the names disappear from the list until new ones are shared.
    await Promise.all(docIds.map(id => deleteDoc(doc(db, "sharedRecords", id))));

    downloadMsg.textContent = "Downloaded and cleared. The list will refill as new records are shared.";
    downloadMsg.className = "msg ok show";

    showEmpty();
  }catch(err){
    console.error("Failed to clear shared records after download:", err);
    downloadMsg.textContent = "Downloaded, but there was a problem clearing the list. Please try again.";
    downloadMsg.className = "msg error show";
    // reload from Firestore so the table reflects whatever did or
    // didn't actually get deleted, instead of guessing
    loadRecords();
  }finally{
    downloadBtn.disabled = false;
    downloadBtnText.textContent = "⬇ Download as Excel";
  }
});

loadRecords();
</script>
</body>
</html>
