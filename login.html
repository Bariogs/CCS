<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — CCS Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
<style>
  /* Wrapper para sa password field + toggle button */
  .password-wrap{
    position: relative;
    display: flex;
    align-items: center;
  }
  .password-wrap input{
    width: 100%;
    padding-right: 42px; /* space para sa icon */
  }
  .toggle-password{
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
  }
  .toggle-password:hover{
    color: #222;
  }
  .toggle-password svg{
    width: 20px;
    height: 20px;
  }
</style>
</head>
<body>

<div class="center-screen">
  <div class="card" style="max-width:400px; width:100%;">
    <p class="eyebrow">CCS Attendance System</p>
    <h1 class="page-title">Log in</h1>
    <p class="page-sub">Use your name and School ID as your password.</p>

    <div id="msg" class="msg error"></div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Name (Username)</label>
        <input type="text" id="username" autocomplete="username" required placeholder="e.g. Juan Dela Cruz">
      </div>
      <div class="field">
        <label for="password">School ID (Password)</label>
        <div class="password-wrap">
          <input type="password" id="password" autocomplete="current-password" required placeholder="e.g. COL-00789">
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
            <!-- eye icon (shown state = hidden password) -->
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn block" id="loginBtn">
        <span id="loginBtnText">Login</span>
      </button>
    </form>
  </div>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

// Hardcoded admin credentials
const ADMIN_USER = "ccsdepevosanser1willbedonemeafteryou";
const ADMIN_PASS = "ITmeperodlimetigayoogwashingmachinTVunsapadiha";

const form = document.getElementById("loginForm");
const msg = document.getElementById("msg");
const loginBtn = document.getElementById("loginBtn");
const loginBtnText = document.getElementById("loginBtnText");

function showError(text){
  msg.textContent = text;
  msg.className = "msg error show";
}

// ---- Show / Hide password toggle ----
const passwordInput = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");
const eyeIcon = document.getElementById("eyeIcon");

const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle>`;
const eyeClosed = `<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06"></path>
<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-2.16 3.19"></path>
<path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
<line x1="1" y1="1" x2="23" y2="23"></line>`;

togglePassword.addEventListener("click", () => {
  const isHidden = passwordInput.type === "password";
  passwordInput.type = isHidden ? "text" : "password";
  eyeIcon.innerHTML = isHidden ? eyeClosed : eyeOpen;
  togglePassword.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msg.className = "msg";

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!username || !password){
    showError("Please fill in both fields.");
    return;
  }

  loginBtn.disabled = true;
  loginBtnText.innerHTML = '<span class="spinner"></span>';

  try{
    // 1. Check admin credentials first
    if(username === ADMIN_USER && password === ADMIN_PASS){
      sessionStorage.setItem("role", "admin");
      sessionStorage.setItem("displayName", "Admin");
      window.location.href = "admin_dashboard.html";
      return;
    }

    // 2. Check student credentials against Firestore "students" collection
    const studentsRef = collection(db, "students");
    const q = query(
      studentsRef,
      where("name", "==", username),
      where("schoolId", "==", password)
    );
    const snap = await getDocs(q);

    if(!snap.empty){
      const studentDoc = snap.docs[0].data();
      sessionStorage.setItem("role", "student");
      sessionStorage.setItem("displayName", studentDoc.name);
      window.location.href = "student_dashboard.html";
    } else {
      showError("Invalid name or School ID. Please try again.");
    }
  }catch(err){
    console.error(err);
    showError("There was an issue with the login process. Please try again.");
  }finally{
    loginBtn.disabled = false;
    loginBtnText.textContent = "Login";
  }
});
</script>
</body>
</html>
